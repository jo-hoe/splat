<article id="editor-pane" data-key="{{.Key}}" data-hash="{{.Hash}}">
  <div class="editor-header">
    <span class="editor-filename" title="{{.Key}}">{{.Basename}}</span>
    <div class="editor-ops-quick">
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-ccw", mode:splat.getMode(), hash:splat.getHash()}'
              title="Rotate 90° counter-clockwise">↺</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-cw", mode:splat.getMode(), hash:splat.getHash()}'
              title="Rotate 90° clockwise">↻</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-180", mode:splat.getMode(), hash:splat.getHash()}'
              title="Rotate 180°">180°</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"flip-h", mode:splat.getMode(), hash:splat.getHash()}'
              title="Flip horizontal">⇄</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"flip-v", mode:splat.getMode(), hash:splat.getHash()}'
              title="Flip vertical">⇅</button>
      <button type="button"
              class="editor-save-btn primary"
              id="save-btn"
              title="Save crop (Enter)">Save</button>
      <button type="button"
              class="editor-delete-btn contrast"
              id="delete-btn"
              data-key="{{.Key}}"
              data-key-url="{{.KeyURL}}"
              title="Delete image">🗑</button>
    </div>
  </div>

  <div class="cropper-wrap">
    <img id="crop-target"
         src="/image/{{.KeyURL}}"
         alt="{{.Basename}}"
         class="crop-target"/>
  </div>

  <form id="apply-form"
        class="editor-toolbar"
        hx-post="/apply/{{.KeyURL}}"
        hx-target="#editor"
        hx-swap="innerHTML">
    <input type="hidden" name="op" value="crop"/>
    <input type="hidden" name="mode" value="inplace" id="apply-mode"/>
    <input type="hidden" name="hash" value="{{.Hash}}"/>
    <input type="hidden" name="x" id="apply-x"/>
    <input type="hidden" name="y" id="apply-y"/>
    <input type="hidden" name="w" id="apply-w"/>
    <input type="hidden" name="h" id="apply-h"/>

    <div class="ratios" role="radiogroup" aria-label="Crop aspect ratio">
      {{range $i, $r := .Ratios}}
      <button type="button"
              class="ratio-btn"
              data-ratio="{{$r.Value}}"
              data-index="{{$i}}">{{$r.Label}}</button>
      {{end}}
      <span class="ratio-custom-group">
        <input type="text"
               id="ratio-custom"
               placeholder="W:H"
               pattern="\d{1,4}:\d{1,4}"
               aria-label="Custom aspect ratio"/>
      </span>
    </div>
  </form>
</article>
