<article id="editor-pane" data-key="{{.Key}}" data-hash="{{.Hash}}">
  <header>
    <h3 title="{{.Key}}">{{.Basename}}</h3>
  </header>

  <div class="cropper-wrap">
    <img id="crop-target"
         src="/image/{{.KeyURL}}"
         alt="{{.Basename}}"
         class="crop-target"/>
  </div>

  <form id="apply-form"
        hx-post="/apply/{{.KeyURL}}"
        hx-target="#editor"
        hx-swap="innerHTML">
    <input type="hidden" name="op" value="crop"/>
    <input type="hidden" name="mode" value="inplace" id="apply-mode"/>
    <input type="hidden" name="hash" value="{{.Hash}}"/>
    <input type="hidden" name="x" id="apply-x"/>
    <input type="hidden" name="y" id="apply-y"/>
    <input type="hidden" name="w" id="apply-w"/>
    <input type="hidden" name="h" id="apply-h"/>

    <fieldset class="ratios" role="radiogroup" aria-label="Crop aspect ratio">
      {{range $i, $r := .Ratios}}
      <button type="button"
              class="ratio-btn"
              data-ratio="{{$r.Value}}"
              data-index="{{$i}}">{{$r.Label}}</button>
      {{end}}
      <input type="text"
             id="ratio-custom"
             placeholder="W:H"
             pattern="\d{1,4}:\d{1,4}"
             aria-label="Custom aspect ratio"/>
      <button type="button" id="ratio-custom-apply">Set</button>
    </fieldset>

    <fieldset class="ops" aria-label="Operations">
      <button type="submit" class="primary" id="apply-btn">Apply crop</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-ccw", mode:splat.getMode(), hash:splat.getHash()}'>↺ 90°</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-cw", mode:splat.getMode(), hash:splat.getHash()}'>↻ 90°</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"rotate-180", mode:splat.getMode(), hash:splat.getHash()}'>180°</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"flip-h", mode:splat.getMode(), hash:splat.getHash()}'>Flip ↔</button>
      <button type="button"
              hx-post="/apply/{{.KeyURL}}"
              hx-target="#editor"
              hx-swap="innerHTML"
              hx-vals='js:{op:"flip-v", mode:splat.getMode(), hash:splat.getHash()}'>Flip ↕</button>
      <button type="button"
              class="contrast"
              id="delete-btn"
              data-key="{{.Key}}"
              data-key-url="{{.KeyURL}}">Delete</button>
    </fieldset>
  </form>
</article>
